<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brunch Food</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              bg: "#111111",
              panel: "#1b1b1b",
              panel2: "#232323",
              text: "#f3ede7",
              muted: "#aaa39b",
              accent: "#f3a34f",
            },
            fontFamily: {
              display: ["Montserrat", "ui-sans-serif", "system-ui"],
              body: ["Be Vietnam Pro", "ui-sans-serif", "system-ui"],
            },
            boxShadow: {
              soft: "0 18px 50px rgba(0,0,0,0.35)",
            },
          },
        },
      };
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=Montserrat:wght@700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <style>
      html { scroll-behavior: smooth; }
      body {
        min-height: 100vh;
        background:
          radial-gradient(circle at top, rgba(243, 163, 79, 0.14), transparent 24%),
          linear-gradient(180deg, #141414 0%, #101010 100%);
      }
      .scroll-hide::-webkit-scrollbar { display: none; }
      .scroll-hide { -ms-overflow-style: none; scrollbar-width: none; }
      .reveal { opacity: 0; transform: translateY(16px); transition: opacity 0.65s ease, transform 0.65s ease; }
      .reveal.is-visible { opacity: 1; transform: translateY(0); }
      .menu-link.active { color: #f3a34f; }
      .menu-link.active::after {
        opacity: 1;
        transform: scaleX(1);
      }
      .menu-link::after {
        content: "";
        display: block;
        height: 2px;
        margin-top: 6px;
        border-radius: 999px;
        background: #f3a34f;
        transform: scaleX(0);
        transform-origin: center;
        opacity: 0;
        transition: transform 0.24s ease, opacity 0.24s ease;
      }
      .nav-icon { font-size: 14px; line-height: 1; }
      .card-hover { transition: transform 0.24s ease, background-color 0.24s ease; }
      .card-hover:hover { transform: translateY(-2px); }
      .size-chip { transition: transform 0.2s ease, background-color 0.2s ease, color 0.2s ease; }
      .size-chip:hover { transform: translateY(-1px); }
      .size-chip.active { background: #f3a34f; color: #111111; }
    </style>
  </head>
  <body class="font-body text-text selection:bg-accent selection:text-bg">
    <div id="app"></div>
    <script type="module" src="./app.js"></script>
  </body>
</html>
